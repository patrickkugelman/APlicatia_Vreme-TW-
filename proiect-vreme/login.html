<!DOCTYPE html>
<html lang="ro" data-tema="intuneric">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conectare — Aplicație Vreme</title>
  <link rel="stylesheet" href="styles/login.css" />
  <link rel="manifest" href="/manifest.json" />
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>Se verifică sesiunea...</p>
  </div>

  <div class="login-bg">
    <!-- Animație nori în fundal -->
    <div class="nor nor1"></div>
    <div class="nor nor2"></div>
    <div class="nor nor3"></div>
    <div class="soare-deco"></div>

    <div class="login-card">
      <div class="login-logo">🌤</div>
      <h1 class="login-titlu">Aplicație Vreme</h1>
      <p class="login-subtitlu">Vreme în timp real pentru orice oraș</p>

      <!-- Tabs Login / Înregistrare -->
      <div class="tabs">
        <button class="tab activ" data-tab="login">Conectare</button>
        <button class="tab" data-tab="register">Cont nou</button>
      </div>

      <!-- Formular Login -->
      <form id="form-login" class="form-auth">
        <div class="camp">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            name="email"
            placeholder="exemplu@email.com"
            autocomplete="email"
            required
          />
        </div>
        <div class="camp">
          <label for="login-parola">Parolă</label>
          <div class="camp-parola">
            <input
              type="password"
              id="login-parola"
              name="password"
              placeholder="Parola ta"
              autocomplete="current-password"
              required
            />
            <button type="button" class="btn-toggle-parola" data-target="login-parola">👁</button>
          </div>
        </div>
        <div id="eroare-login" class="mesaj-eroare ascuns"></div>
        <button type="submit" class="btn-submit" id="btn-login">
          <span class="btn-text">Conectează-te</span>
          <span class="btn-spinner ascuns">⏳</span>
        </button>
      </form>

      <!-- Formular Înregistrare -->
      <form id="form-register" class="form-auth ascuns">
        <div class="camp">
          <label for="reg-nume">Nume complet</label>
          <input
            type="text"
            id="reg-nume"
            name="name"
            placeholder="Ion Popescu"
            autocomplete="name"
            required
            minlength="2"
          />
        </div>
        <div class="camp">
          <label for="reg-email">Email</label>
          <input
            type="email"
            id="reg-email"
            name="email"
            placeholder="exemplu@email.com"
            autocomplete="email"
            required
          />
        </div>
        <div class="camp">
          <label for="reg-parola">Parolă</label>
          <div class="camp-parola">
            <input
              type="password"
              id="reg-parola"
              name="password"
              placeholder="Minimum 6 caractere"
              autocomplete="new-password"
              required
              minlength="6"
            />
            <button type="button" class="btn-toggle-parola" data-target="reg-parola">👁</button>
          </div>
        </div>
        <div class="camp">
          <label for="reg-parola2">Confirmă parola</label>
          <div class="camp-parola">
            <input
              type="password"
              id="reg-parola2"
              name="password2"
              placeholder="Repetă parola"
              autocomplete="new-password"
              required
            />
            <button type="button" class="btn-toggle-parola" data-target="reg-parola2">👁</button>
          </div>
        </div>
        <div id="eroare-register" class="mesaj-eroare ascuns"></div>
        <button type="submit" class="btn-submit" id="btn-register">
          <span class="btn-text">Creează cont</span>
          <span class="btn-spinner ascuns">⏳</span>
        </button>
      </form>

      <p class="login-footer">© 2025 Aplicație Vreme — Proiect TW</p>
    </div>
  </div>

  <script type="module" src="src/pages/login.js"></script>
  <script type="module">
    if ('serviceWorker' in navigator && import.meta.env.PROD) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Aplicație Vreme</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0f1e;
      color: #f0f4ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 5rem; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    h1 { color: #e2b96f; font-size: 1.8rem; }
    p  { color: #8090aa; max-width: 320px; line-height: 1.6; }
    button {
      background: #e2b96f;
      border: none;
      border-radius: 10px;
      color: #0a0f1e;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.75rem 2rem;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">🌧️</div>
  <h1>Ești offline</h1>
  <p>Nu există conexiune la internet. Verifică rețeaua și încearcă din nou.</p>
  <button onclick="location.reload()">🔄 Reîncearcă</button>
</body>
</html>
